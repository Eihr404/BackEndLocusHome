<div class="shell">
  <header class="topbar">
    <a class="brand" routerLink="/">
      <img class="brand-logo" src="/logo.png" alt="Locus Alojamientos" />
      <div>
        <strong>Locus</strong>
        <small>Alojamientos</small>
      </div>
    </a>

    <nav class="nav">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Inicio</a>
      <a routerLink="/explorar" routerLinkActive="active">Explorar</a>
      <a routerLink="/mis-reservas" routerLinkActive="active">Mis reservas</a>
      <a *ngIf="session()?.role === 'socio'" routerLink="/socio" routerLinkActive="active">Panel socio</a>
    </nav>

    <div class="actions">
      <div *ngIf="session() as user" class="session-pill">
        <span>{{ user.nombreCompleto }}</span>
        <small>{{ user.role }} <span *ngIf="user.demoMode">demo</span></small>
      </div>
      <a *ngIf="!session()" class="ghost-btn" routerLink="/login">Ingresar</a>
      <a class="primary-btn" [routerLink]="ctaLink()">
        {{ session()?.role === 'socio' ? 'Ir al panel' : 'Buscar estadia' }}
      </a>
      <button *ngIf="session()" class="ghost-btn" type="button" (click)="logout()">Salir</button>
    </div>
  </header>

  <main class="content">
    <router-outlet />
  </main>
</div>
