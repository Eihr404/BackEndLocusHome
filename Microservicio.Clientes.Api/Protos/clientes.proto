syntax = "proto3";

option csharp_namespace = "Microservicio.Clientes.Api.Protos";

package clientes;

// El servicio de clientes de alta velocidad para comunicaciA3n interna
service ClientesGrpc {
  // Obtener resumen de un cliente por su ID
  rpc ObtenerClienteResumen (ClienteRequest) returns (ClienteResumenReply);
}

message ClienteRequest {
  int32 clienteId = 1;
}

message ClienteResumenReply {
  int32 clienteId = 1;
  string nombreCompleto = 2;
  string email = 3;
  string nivelFidelidad = 4;
}
