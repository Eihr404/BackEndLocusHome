syntax = "proto3";

package BookingPro.Inventario;

// Esto genera el código C# en este namespace
option csharp_namespace = "Microservicio.Clientes.Api.Grpc";

// ==========================================
// MENSAJES (DTOs)
// ==========================================

message VerificarDisponibilidadRequest {
    int32 propiedad_id = 1;
    int32 num_adultos = 2;
    int32 num_ninos = 3;
    string fecha_checkin = 4; // ISO 8601 YYYY-MM-DD
    string fecha_checkout = 5;
}

message VerificarDisponibilidadResponse {
    bool disponible = 1;
    repeated int32 habitaciones_disponibles_ids = 2;
    string mensaje = 3;
}

// ==========================================
// SERVICIOS RPC
// ==========================================

service InventarioGrpcService {
    // Unary RPC: Consulta simple de disponibilidad
    rpc ConsultarDisponibilidad (VerificarDisponibilidadRequest) returns (VerificarDisponibilidadResponse);
}
