services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "5028:5028"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    restart: always

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.front
    ports:
      - "5173:80"
    depends_on:
      - api
    restart: always
